// --- Gemini API (AI 功能助手) ---
const apiKey = ""; 

const callGemini = async (prompt) => {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
  const payload = {
    contents: [{ parts: [{ text: prompt }] }],
    systemInstruction: { 
      parts: [{ text: "你是一个专业的建筑设计AI助手。输出内容必须专业、有深刻的建筑理论洞察力，并且使用中文。" }] 
    }
  };

  let retries = 5;
  let delay = 1000;

  while (retries > 0) {
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      
      if (!response.ok) throw new Error('网络请求失败');
      
      const result = await response.json();
      return result.candidates?.[0]?.content?.parts?.[0]?.text || "暂无结果";
    } catch (error) {
      retries--;
      if (retries === 0) {
        return "抱歉，AI 暂时无法响应，请稍后再试。";
      }
      await new Promise(resolve => setTimeout(resolve, delay));
      delay *= 2; 
    }
  }
};

// --- ★ 新增交互组件：探照灯悬浮卡片 (Spotlight Card) ★ ---
const TiltSpotlightCard = ({ children, className = "" }) => {
  const cardRef = useRef(null);
  const [style, setStyle] = useState({});
  const [mousePos, setMousePos] = useState({ x: -1000, y: -1000 });
  const [isHovered, setIsHovered] = useState(false);

  const handleMouseMove = (e) => {
    if (!cardRef.current) return;
    const { left, top, width, height } = cardRef.current.getBoundingClientRect();
    
    // 计算 3D 倾斜
    const x = (e.clientX - left) / width - 0.5;
    const y = (e.clientY - top) / height - 0.5;
    
    // 记录探照灯内部坐标
    setMousePos({ x: e.clientX - left, y: e.clientY - top });

    setStyle({
      transform: `perspective(1000px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg) scale3d(1.02, 1.02, 1.02)`,
      transition: 'transform 0.1s ease-out'
    });
  };
  
  const handleMouseLeave = () => {
    setIsHovered(false);
    setStyle({ 
      transform: 'perspective(1000px) rotateY(0deg) rotateX(0deg) scale3d(1, 1, 1)', 
      transition: 'transform 0.5s ease-out' 
    });
  };

  return (
    <div 
      ref={cardRef}
      onMouseEnter={() => setIsHovered(true)}
      onMouseMove={handleMouseMove} 
      onMouseLeave={handleMouseLeave} 
      style={{ ...style, transformStyle: "preserve-3d", WebkitFontSmoothing: "antialiased" }} 
      className={`relative rounded-2xl overflow-hidden group ${className}`}
    >
      {/* 探照灯跟随光晕层 */}
      <div 
        className="pointer-events-none absolute -inset-px rounded-2xl opacity-0 transition duration-300 group-hover:opacity-100 z-20 mix-blend-overlay"
        style={{
          background: `radial-gradient(600px circle at ${mousePos.x}px ${mousePos.y}px, rgba(255, 255, 255, 0.4), transparent 40%)`
        }}
      />
      {children}
    </div>
  );
};

// --- ★ 新增交互组件：文字逐词浮现 (Staggered Text Reveal) ★ ---
const StaggeredText = ({ text, className = "", delayOffset = 0 }) => {
  const words = text.split(" ");
  return (
    <span className={`inline-block ${className}`}>
      {words.map((word, index) => (
        <span key={index} className="inline-block overflow-hidden pb-2 mr-3 md:mr-4 align-bottom">
          <span 
            className="inline-block opacity-0 animate-text-reveal"
            style={{ 
              animationDelay: `${delayOffset + index * 100}ms`,
              animationDuration: '800ms',
              animationTimingFunction: 'cubic-bezier(0.16, 1, 0.3, 1)'
            }}
          >
            {word}
          </span>
        </span>
      ))}
    </span>
  );
};


// --- 交互辅助组件 1：全局滚动进度条 ---
const ScrollProgressBar = () => {
  const [scrollWidth, setScrollWidth] = useState(0);
  useEffect(() => {
    const handleScroll = () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = (scrollTop / docHeight) * 100;
      setScrollWidth(progress);
    };
    window.addEventListener('scroll', handleScroll);
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);
  return (
    <div 
      className="fixed top-0 left-0 h-1 bg-red-800 z-50 transition-all duration-75 ease-out shadow-[0_0_10px_rgba(153,27,27,0.8)]" 
      style={{ width: `${scrollWidth}%` }} 
    />
  );
};

// --- 交互辅助组件 5：磁性吸附按钮 (Magnetic Element) ---
const MagneticElement = ({ children, className = "", strength = 0.3 }) => {
  const ref = useRef(null);
  const [position, setPosition] = useState({ x: 0, y: 0 });

  const handleMouseMove = (e) => {
    if (!ref.current) return;
    const { left, top, width, height } = ref.current.getBoundingClientRect();
    const centerX = left + width / 2;
    const centerY = top + height / 2;
    const x = (e.clientX - centerX) * strength; 
    const y = (e.clientY - centerY) * strength;
    setPosition({ x, y });
  };

  const handleMouseLeave = () => {
    setPosition({ x: 0, y: 0 });
  };

  return (
    <div
      ref={ref}
      onMouseMove={handleMouseMove}
      onMouseLeave={handleMouseLeave}
      className={`inline-block ${className}`}
    >
      <div
        style={{ 
          transform: `translate3d(${position.x}px, ${position.y}px, 0)`,
          transition: position.x === 0 && position.y === 0 ? 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)' : 'transform 0.1s ease-out'
        }}
      >
        {children}
      </div>
    </div>
  );
};

// --- 原有辅助组件：图片渲染 ---
const ProjectImage = ({ src, alt, className = "" }) => {
  const [hasError, setHasError] = useState(false);

  if (hasError || !src) {
    return (
      <div className={`relative overflow-hidden flex flex-col items-center justify-center bg-zinc-900 text-zinc-400 font-medium tracking-wider ${className}`}>
        <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'linear-gradient(#333 1px, transparent 1px), linear-gradient(90deg, #333 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
        <Icon name="image" size={24} className="opacity-50 mb-2 z-10" />
        <span className="relative z-10 text-sm px-4 text-center">{alt}</span>
      </div>
    );
  }

  return (
    <img 
      src={src} 
      alt={alt} 
      className={`object-cover ${className}`}
      onError={() => setHasError(true)}
    />
  );
};

// --- 原有辅助组件：滚动动画 ---
const RevealOnScroll = ({ children, className = "", delay = 0 }) => {
  const [isVisible, setIsVisible] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const observer = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          setIsVisible(true);
          observer.unobserve(entry.target);
        }
      },
      { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
    );
    if (ref.current) observer.observe(ref.current);
    return () => { if (ref.current) observer.disconnect(); };
  }, []);

  return (
    <div
      ref={ref}
      style={{ transitionDelay: `${delay}ms` }}
      className={`transition-all duration-1000 ease-out ${
        isVisible ? "opacity-100 translate-y-0" : "opacity-0 translate-y-12"
      } ${className}`}
    >
      {children}
    </div>
  );
};

// --- ★ 全新升级：项目二专属的高级 SVG 动态拉取与解析组件 ★ ---
const AnimatedProject2LocationOverlay = ({ url }) => {
  const [svgContent, setSvgContent] = useState(null);
  const containerRef = useRef(null);

  // 1. 从 Github Raw 动态拉取 SVG 代码
  useEffect(() => {
    if (!url) return;
    fetch(url)
      .then(res => {
         if (!res.ok) throw new Error('SVG 加载失败');
         return res.text();
      })
      .then(text => {
        // ★ 核心修复：保留原始宽高用于后续推导 viewBox，不再使用正则强行删除
        let cleanedText = text;
                              
        // ★ 核心修复：SVG 样式类名隔离，防止 AI 导出的 cls- 类名与项目一发生全局冲突导致变色
        cleanedText = cleanedText.replace(/cls-/g, 'p2-loc-cls-')
                                 .replace(/\.st([0-9]+)/g, '.p2-loc-st$1')
                                 .replace(/class="st([0-9]+)/g, 'class="p2-loc-st$1');

        setSvgContent(cleanedText);
      })
      .catch(err => console.error("SVG 动画层加载失败:", err));
  }, [url]);

  // 2. SVG 注入 DOM 后，利用 JS 智能解析图层，注入交错动画
  useEffect(() => {
    if (svgContent && containerRef.current) {
      const svgEl = containerRef.current.querySelector('svg');
      if (svgEl) {
        // ★ 终极对齐修复引擎：如果 SVG 没有 viewBox，强制根据原宽高生成，保证缩放比例 100% 锁定不跑偏
        if (!svgEl.hasAttribute('viewBox')) {
            const w = svgEl.getAttribute('width');
            const h = svgEl.getAttribute('height');
            if (w && h) {
                const wVal = parseFloat(w.replace(/[^0-9.]/g, ''));
                const hVal = parseFloat(h.replace(/[^0-9.]/g, ''));
                if (!isNaN(wVal) && !isNaN(hVal)) {
                    svgEl.setAttribute('viewBox', `0 0 ${wVal} ${hVal}`);
                }
            }
        }
        
        // 强制清除定值，开启全自适应模式，完美对齐底图
        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');
        svgEl.setAttribute('width', '100%');
        svgEl.setAttribute('height', '100%');
        svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        svgEl.style.width = '100%';
        svgEl.style.height = '100%';
        svgEl.style.objectFit = 'contain';
        svgEl.style.display = 'block'; // 消除内联元素自带的底部空白下沉间隙
        
        // 抓取 SVG 内部的根级编组(图层)和主要元素
        const topLevelGroups = Array.from(svgEl.querySelectorAll('svg > g, svg > path, svg > rect, svg > polygon'));
        
        let currentDelay = 0.2;
        const delayStep = 0.5;

        topLevelGroups.forEach((el) => {
           if (el.id === '不动' || el.id === 'Background') return; 
           el.classList.add('p2-magic-anim');
           el.style.animationDelay = `${currentDelay}s`;
           currentDelay += delayStep;

           const paths = el.querySelectorAll('path, line, polyline');
           paths.forEach(p => {
               const length = p.getTotalLength ? p.getTotalLength() : 0;
               if (length > 50) {
                  p.style.setProperty('--path-len', length);
                  p.classList.add('p2-magic-draw');
                  p.style.animationDelay = `${currentDelay - delayStep + 0.2}s`; 
               }
           });
        });
      }
    }
  }, [svgContent]);

  if (!svgContent) return null; 

  return (
    <div ref={containerRef} className="absolute inset-0 w-full h-full pointer-events-none z-10 flex items-center justify-center">
      <style dangerouslySetInnerHTML={{__html: `
        .p2-magic-anim {
           opacity: 0;
           transform: scale(0.8) translateZ(-100px) translateX(-40px);
           transform-origin: center center;
           clip-path: inset(0 100% 0 0); 
           animation: magicReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes magicReveal {
           0% { opacity: 0; transform: scale(0.8) translateZ(-100px) translateX(-40px); clip-path: inset(0 100% 0 0); }
           60% { opacity: 1; transform: scale(1.02) translateZ(10px) translateX(5px); clip-path: inset(0 0 0 0); }
           100% { opacity: 1; transform: scale(1) translateZ(0) translateX(0); clip-path: inset(0 0 0 0); }
        }
        .p2-magic-draw {
           stroke-dasharray: var(--path-len, 2000);
           stroke-dashoffset: var(--path-len, 2000);
           animation: magicReveal 1s forwards, drawMagic 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        @keyframes drawMagic { to { stroke-dashoffset: 0; } }
      `}} />
      <div dangerouslySetInnerHTML={{ __html: svgContent }} className="w-full h-full drop-shadow-xl flex items-center justify-center" />
    </div>
  );
};

        });

            if (!colorStr) return 3;
            
            let r = 0, g = 0, b = 0;
            
            // 提取 rgb() 格式
            if (colorStr.includes('rgb')) {
                const match = colorStr.match(/\d+/g);
                if (match && match.length >= 3) {
                    r = parseInt(match[0], 10);
                    g = parseInt(match[1], 10);
                    b = parseInt(match[2], 10);

            // 提取 hex 格式 (#RRGGBB)

            const group = colorGroups[key];
            
            // 组内：基于空间坐标“从左到右，从上到下”智能排序
            group.sort((a, b) => {
                let bboxA = {x:0, y:0}, bboxB = {x:0, y:0};
                try { bboxA = a.getBBox(); bboxB = b.getBBox(); } catch(e) {}
                
                // X轴相差超过40像素，判定为左右顺位；否则判定为上下顺位
                if (Math.abs(bboxA.x - bboxB.x) > 40) {
                    return bboxA.x - bboxB.x;
                }
                return bboxA.y - bboxB.y;
            });

            group.forEach(el => {
                el.classList.add('zone-slide-in');
                el.style.animationDelay = `${currentDelay}s`;
                currentDelay += itemDelayStep;
            });
            
            currentDelay += groupDelayStep; // 一种颜色区域全部放完后，稍作停顿，准备放入下一种颜色
        });

        // 图例中的文字、引线等辅助元素最后再整体渐显
        const others = Array.from(svgEl.querySelectorAll('text, tspan, line, polyline')).filter(el => !el.classList.contains('zone-slide-in') && el.id !== 'Background');
        others.forEach(el => {
            el.classList.add('zone-fade-in');
            el.style.animationDelay = `${currentDelay}s`;
        });
      }
    }
  }, [svgContent]);

  if (!svgContent) return null;

  return (
    <div ref={containerRef} className="absolute inset-0 w-full h-full pointer-events-none z-10 flex items-center justify-center">
      <style dangerouslySetInnerHTML={{__html: `
        .zone-svg-wrapper text, .zone-svg-wrapper tspan {
           font-family: "PingFang SC", "Microsoft YaHei", sans-serif !important;
        }

        /* 动静分区专属的“侧向滑入+遮罩揭示”动画 */
        .zone-slide-in {
           opacity: 0;
           transform: translateX(-15px);
           clip-path: inset(0 100% 0 0);
           animation: zoneSlideAnim 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        
        @keyframes zoneSlideAnim {
           to { opacity: 1; transform: translateX(0); clip-path: inset(0 0 0 0); }
        }

        .zone-fade-in {
           opacity: 0;
           animation: zoneFadeAnim 1s ease-out forwards;
        }

        @keyframes zoneFadeAnim {
           to { opacity: 1; }
        }
      `}} />
      <div dangerouslySetInnerHTML={{ __html: svgContent }} className="w-full h-full drop-shadow-md zone-svg-wrapper flex items-center justify-center" />
    </div>
  );
};


// --- ★ 新增组件：专属爆炸图动画解析器 (Animated Explosion SVG) ★ ---
// 专门负责实现“从右到左，从上到下”依次流动出现
const AnimatedExplosionSVG = ({ url }) => {
  const [svgContent, setSvgContent] = useState(null);
  const containerRef = useRef(null);

  useEffect(() => {
    if (!url) return;
    fetch(url)
      .then(res => {
         if (!res.ok) throw new Error('SVG 加载失败');
         return res.text();
      })
      .then(text => {
        let cleanedText = text;
        // 样式类名隔离，防止全局渲染污染
        cleanedText = cleanedText.replace(/cls-/g, 'p2-exp-cls-')
                                 .replace(/\.st([0-9]+)/g, '.p2-exp-st$1')
                                 .replace(/class="st([0-9]+)/g, 'class="p2-exp-st$1');
        setSvgContent(cleanedText);
      })
      .catch(err => console.error("Explosion SVG 加载失败:", err));
  }, [url]);

  useEffect(() => {
    if (svgContent && containerRef.current) {
      const svgEl = containerRef.current.querySelector('svg');
      if (svgEl) {
        // 强制修复 viewBox 和完美居中对齐逻辑
        if (!svgEl.hasAttribute('viewBox')) {
            const w = svgEl.getAttribute('width');
            const h = svgEl.getAttribute('height');
            if (w && h) {
                const wVal = parseFloat(w.replace(/[^0-9.]/g, ''));
                const hVal = parseFloat(h.replace(/[^0-9.]/g, ''));
                if (!isNaN(wVal) && !isNaN(hVal)) {
                    svgEl.setAttribute('viewBox', `0 0 ${wVal} ${hVal}`);
                }
            }
        }
        
        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');
        svgEl.setAttribute('width', '100%');
        svgEl.setAttribute('height', '100%');
        svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        svgEl.style.width = '100%';
        svgEl.style.height = '100%';
        svgEl.style.objectFit = 'contain';
        svgEl.style.display = 'block';
        
        // ★ 核心修复：彻底隐藏 SVG 内部残留的图片元素，防止破损占位符被放大撑爆画板！
        const embeddedImages = svgEl.querySelectorAll('image');
        embeddedImages.forEach(img => img.style.display = 'none');
        
        // ★ 核心修复：从抓取列表中剔除 'image' 标签，只针对线条、多边形和文字做动画
        let shapes = Array.from(svgEl.querySelectorAll('path, rect, polygon, circle, ellipse, line, polyline, text, tspan'));
        shapes = shapes.filter(p => {
           if(p.id === '不动' || p.id === 'Background') return false;
           // 避免给 defs 里的定义元素加上动画导致渲染异常
           if(p.closest('defs') || p.closest('clipPath')) return false;
           return true;
        });

        // 核心智能逻辑：根据“从右到左，从上到下”进行排序
        shapes.sort((a, b) => {
            let bboxA = {x:0, y:0}, bboxB = {x:0, y:0};
            try { bboxA = a.getBBox(); bboxB = b.getBBox(); } catch(e) {}
            
            // X轴相差超过30像素，优先判定为左右关系（从右到左，X坐标大的排在前面）
            if (Math.abs(bboxB.x - bboxA.x) > 30) {
                return bboxB.x - bboxA.x;
            }
            // 处于相近的垂直列时，则判定为上下关系（从上到下，Y坐标小的排在前面）
            return bboxA.y - bboxB.y;
        });

        let currentDelay = 0.2;
        const itemDelayStep = 0.15; // 控制元素依次出现的流动间隔

        shapes.forEach(el => {
            const tag = el.tagName.toLowerCase();
            // 判断是否为纯线条
            const isLine = ['path', 'line', 'polyline'].includes(tag);
            const fill = window.getComputedStyle(el).fill || el.getAttribute('fill');
            const stroke = window.getComputedStyle(el).stroke || el.getAttribute('stroke');
            const hasStroke = stroke && stroke !== 'none' && stroke !== 'transparent';
            const hasFill = fill && fill !== 'none' && fill !== 'transparent' && fill !== '#ffffff';

            if (isLine && hasStroke && !hasFill) {
                const len = el.getTotalLength ? el.getTotalLength() : 1000;
                el.style.setProperty('--path-len', len);
                el.classList.add('exp-slide-line');
            } else {
                el.classList.add('exp-fade-in');
            }
            el.style.animationDelay = `${currentDelay}s`;
            currentDelay += itemDelayStep;
        });
      }
    }
  }, [svgContent]);

  if (!svgContent) return null;

  return (
    <div ref={containerRef} className="absolute inset-0 w-full h-full pointer-events-none z-10 flex items-center justify-center">
      <style dangerouslySetInnerHTML={{__html: `
        .exp-svg-wrapper text, .exp-svg-wrapper tspan {
           font-family: "PingFang SC", "Microsoft YaHei", sans-serif !important;
        }

        /* 爆炸图专属：线条绘制生长动画 */
        .exp-slide-line {
           stroke-dasharray: var(--path-len, 1000);
           stroke-dashoffset: var(--path-len, 1000);
           opacity: 0;
           animation: expLineAnim 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
        
        @keyframes expLineAnim {
           0% { stroke-dashoffset: var(--path-len, 1000); opacity: 1; }
           100% { stroke-dashoffset: 0; opacity: 1; }
        }

        /* 爆炸图专属：体块、文字和图像侧向滑入揭示动画 */
        .exp-fade-in {
           opacity: 0;
           transform: translateX(15px);
           animation: expFadeAnim 0.8s ease-out forwards;
        }

        @keyframes expFadeAnim {
           to { opacity: 1; transform: translateX(0); }
        }
      `}} />
      <div dangerouslySetInnerHTML={{ __html: svgContent }} className="w-full h-full drop-shadow-md exp-svg-wrapper flex items-center justify-center" />
    </div>
  );
};

// --- ★ 恢复丢失的组件：专属生态系统动画解析器 (Animated System SVG) ★ ---
// 专门负责实现“按图层顺序依次显示，且每一层均由左向右拉开显示”
const AnimatedSystemSVG = ({ url }) => {
  const [svgContent, setSvgContent] = useState(null);
  const containerRef = useRef(null);

  useEffect(() => {
    if (!url) return;
    fetch(url)
      .then(res => res.ok ? res.text() : null)
      .then(text => {
        if(text) {
           let cleanedText = text.replace(/cls-/g, 'p2-sys-cls-').replace(/\.st([0-9]+)/g, '.p2-sys-st$1').replace(/class="st([0-9]+)/g, 'class="p2-sys-st$1');
           setSvgContent(cleanedText);
        }
      })
      .catch(err => console.error("System SVG 加载失败:", err));
  }, [url]);

  useEffect(() => {
    if (svgContent && containerRef.current) {
      const svgEl = containerRef.current.querySelector('svg');
      if (svgEl) {
        if (!svgEl.hasAttribute('viewBox')) {
            const w = svgEl.getAttribute('width');
            const h = svgEl.getAttribute('height');
            if (w && h) {
                const wVal = parseFloat(w.replace(/[^0-9.]/g, ''));
                const hVal = parseFloat(h.replace(/[^0-9.]/g, ''));
                if (!isNaN(wVal) && !isNaN(hVal)) {
                    svgEl.setAttribute('viewBox', `0 0 ${wVal} ${hVal}`);
                }
            }
        }
        svgEl.removeAttribute('width');
        svgEl.removeAttribute('height');
        svgEl.setAttribute('width', '100%');
        svgEl.setAttribute('height', '100%');
        svgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        svgEl.style.width = '100%';
        svgEl.style.height = '100%';
        svgEl.style.objectFit = 'contain';
        svgEl.style.display = 'block';

        const embeddedImages = svgEl.querySelectorAll('image');
        embeddedImages.forEach(img => img.style.display = 'none');

        let rootChildren = Array.from(svgEl.children);
        let targetGroups = rootChildren.filter(el => {
            const tag = el.tagName.toLowerCase();
            return tag !== 'defs' && tag !== 'style' && tag !== 'image' && el.id !== '不动' && el.id !== 'Background';
        });

        if (targetGroups.length === 1 && targetGroups[0].tagName.toLowerCase() === 'g') {
            targetGroups = Array.from(targetGroups[0].children).filter(el => {
               const tag = el.tagName.toLowerCase();
               return tag !== 'defs' && tag !== 'style' && tag !== 'image';
            });
        }

        let currentDelay = 0.5;
        const slideDuration = 1.5; // 每一层从左往右拉开的时间

        targetGroups.forEach((el) => {
           el.classList.add('sys-layer-slide');
           el.style.animationDelay = `${currentDelay}s`;
           el.style.animationDuration = `${slideDuration}s`;
           currentDelay += slideDuration + 0.2; // 上一层拉完后，下一层紧接着拉开
        });
      }
    }
  }, [svgContent]);

  if (!svgContent) return null;

  return (
    <div ref={containerRef} className="absolute inset-0 w-full h-full pointer-events-none z-10 flex items-center justify-center">
      <style dangerouslySetInnerHTML={{__html: `
        .sys-svg-wrapper text, .sys-svg-wrapper tspan {
           font-family: "PingFang SC", "Microsoft YaHei", sans-serif !important;
        }
        .sys-layer-slide {
           opacity: 0;
           clip-path: inset(0 100% 0 0); /* 初始状态下把右边的部分全部遮挡（即遮挡到最左边） */
           animation-name: sysSlideRightAnim;
           animation-fill-mode: forwards;
           animation-timing-function: cubic-bezier(0.25, 1, 0.5, 1);
        }
        @keyframes sysSlideRightAnim {
           0% { opacity: 1; clip-path: inset(0 100% 0 0); }
           100% { opacity: 1; clip-path: inset(-20% -20% -20% -20%); } /* 完全揭开 */
        }
      `}} />
      <div dangerouslySetInnerHTML={{ __html: svgContent }} className="w-full h-full drop-shadow-md sys-svg-wrapper flex items-center justify-center" />
    </div>
  );
};

// --- ★ 升级版组件 1：通用的 SVG 智能描边动画解析器 (支持方向与行为智能识别) ★ ---
const AnimatedSvgGraphic = ({ url, animStyle = 'brick' }) => {
  const [svgContent, setSvgContent] = useState(null);
  const containerRef = useRef(null);

  useEffect(() => {
    if (!url) return;
    fetch(url)
      .then(res => res.ok ? res.text() : null)
      .then(text => {
        if (text) {
          // 清理固定宽高
          let cleanedText = text.replace(/<svg([^>]*)(width="[^"]*")([^>]*)>/, '<svg$1$3>')
                                .replace(/<svg([^>]*)(height="[^"]*")([^>]*)>/, '<svg$1$3>');
          // 防止全局样式污染
          cleanedText = cleanedText.replace(/cls-/g, 'flip-svg-cls-').replace(/\.st([0-9]+)/g, '.flip-svg-st$1');
          setSvgContent(cleanedText);
        }
      })
      .catch(err => console.error("翻转卡片 SVG 加载失败:", err));
  }, [url]);

  useEffect(() => {
    if (svgContent && containerRef.current) {
      const svgEl = containerRef.current.querySelector('svg');
      if (svgEl) {
        // ★ 将原本的 object-contain 和 p-4 移除，改为绝对铺满的 object-cover，以便与背部的静态底图 100% 精准重叠对齐
        svgEl.classList.add('w-full', 'h-full', 'object-cover');
        
        // 递归检查元素是否带有填充色 (砖块/文字)
        const checkFill = (node) => {
            const fill = node.getAttribute('fill');
            // 忽略白色背景或无色
            if (fill && fill !== 'none' && fill !== 'transparent' && fill !== '#ffffff' && fill !== '#fff') return true;
            const style = node.style;
            if (style && style.fill && style.fill !== 'none' && style.fill !== 'transparent' && style.fill !== '#ffffff') return true;
            for (let i = 0; i < node.children.length; i++) {
                if (checkFill(node.children[i])) return true;
            }
            return false;
        };

        // 递归检查元素是否带有描边 (线条)
        const checkStroke = (node) => {
            const stroke = node.getAttribute('stroke');
            if (stroke && stroke !== 'none' && stroke !== 'transparent') return true;
            const style = node.style;
            if (style && style.stroke && style.stroke !== 'none' && style.stroke !== 'transparent') return true;
            for (let i = 0; i < node.children.length; i++) {
                if (checkStroke(node.children[i])) return true;
            }
            return false;
        };

        // 提取顶层组或路径
        const groups = Array.from(svgEl.querySelectorAll('svg > g, svg > path, svg > rect, svg > polygon, svg > line, svg > polyline'));
        let delay = 0.1;
        
        groups.forEach(el => {
          if (el.tagName.toLowerCase() === 'defs' || el.tagName.toLowerCase() === 'style') return;
          
          let isWide = false;
          let isTall = false;
          try {
              const bbox = el.getBBox();
              if (bbox.width < 1 && bbox.height < 1) return; // 忽略不可见噪点
              isWide = bbox.width > bbox.height;
              isTall = bbox.height >= bbox.width;
          } catch(e) {}

          const hasFill = checkFill(el);
          const hasStroke = checkStroke(el);
          const isLineOnly = hasStroke && !hasFill; // 纯线条判断

          // ★ 核心智能分发系统：根据传入的动画风格分发不同方向的动效
          if (animStyle === 'wood') {
              // 【旋转木板逻辑】：全部由左向右
              if (isLineOnly) {
                  el.classList.add('flip-line-right'); // 线条：由左向右滑动
              } else {
                  el.classList.add('flip-board-right'); // 木板：由左向右出现
              }
          } else {
              // 【红砖重构逻辑】：由下往上 / 由右向左
              if (isLineOnly && isWide) {
                  el.classList.add('flip-line-left');
              } else if (isLineOnly && isTall) {
                  el.classList.add('flip-line-up');
              } else {
                  el.classList.add('flip-brick-up');
              }
          }
          
          el.style.animationDelay = `${delay}s`;
          delay += 0.15; // 级联延迟控制入场顺序
        });
      }
    }
  }, [svgContent, animStyle]);

  if (!svgContent) {
    return (
      <div className="w-full h-full flex flex-col items-center justify-center text-zinc-400 bg-zinc-50 border-2 border-dashed border-zinc-200 rounded-xl">
         <Icon name="file-code" size={32} className="mb-2 opacity-50" />
         <span className="text-[10px] font-bold tracking-widest uppercase">Waiting for SVG Data</span>
      </div>
    );
  }

  return (
    <div ref={containerRef} className="absolute inset-0 w-full h-full flex items-center justify-center">
      <style dangerouslySetInnerHTML={{__html: `
        /* 砖块：由下往上出现 (位移 + 淡入) */
        .flip-brick-up {
            opacity: 0;
            transform: translateY(30px);
            animation: flipBrickUpAnim 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes flipBrickUpAnim {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 线条1：由下往上滑动 (底部裁切揭开) */
        .flip-line-up {
            opacity: 0;
            clip-path: inset(100% 0 0 0);
            transform: translateY(10px);
            animation: flipLineUpAnim 0.8s ease-out forwards;
        }
        @keyframes flipLineUpAnim {
            to { opacity: 1; clip-path: inset(0 0 0 0); transform: translateY(0); }
        }

        /* 斜线：由右向左滑动 (右侧裁切揭开) */
        .flip-line-left {
            opacity: 0;
            clip-path: inset(0 -20% 0 100%);
            transform: translateX(10px);
            animation: flipLineLeftAnim 0.8s ease-out forwards;
        }
        @keyframes flipLineLeftAnim {
            to { opacity: 1; clip-path: inset(0 -20% 0 0); transform: translateX(0); }
        }

        /* --- 新增：旋转木板专属动效 (由左向右) --- */
        /* 木板：由左往右出现 (位移 + 淡入) */
        .flip-board-right {
            opacity: 0;
            transform: translateX(-30px);
            animation: flipBoardRightAnim 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes flipBoardRightAnim {
            to { opacity: 1; transform: translateX(0); }
        }

        /* 线条：由左往右滑动 (左侧裁切揭开) */
        .flip-line-right {
            opacity: 0;
            clip-path: inset(0 100% 0 0); /* 初始隐藏在左侧 */
            transform: translateX(-10px);
            animation: flipLineRightAnim 0.8s ease-out forwards;
        }
        @keyframes flipLineRightAnim {
            to { opacity: 1; clip-path: inset(0 0 0 0); transform: translateX(0); }
        }
      `}} />
      <div dangerouslySetInnerHTML={{ __html: svgContent }} className="w-full h-full" />
    </div>
  );
};

                    <span key={mIdx} className="px-2 py-1 bg-white border border-zinc-200 text-zinc-600 text-[9px] md:text-[10px] font-bold tracking-widest rounded-md shadow-sm">
                      {method}
                    </span>
                  ))}
               </div>
           </div>
        </div>

        {/* 背面 (蓝色线框)：底图叠加 SVG 动画 */}
        <div 
          className="absolute inset-0 w-full h-full bg-white rounded-[2rem] border border-zinc-200 shadow-inner flex items-center justify-center overflow-hidden"
          style={{ backfaceVisibility: 'hidden', transform: 'rotateY(180deg)' }}
        >
           <div className="w-full h-full relative flex items-center justify-center bg-zinc-50" key={isFlipped ? 'flipped' : 'unflipped'}>
             
             {/* 第一层：渲染反面静态底图 (包含文本与框架) */}
             {item.backImage && (
                 <div className="absolute inset-0 z-0">
                     <ProjectImage src={item.backImage} alt={`${item.name} back`} className="w-full h-full object-cover" />
                 </div>
             )}
             
             {/* 第二层：叠加渲染 SVG 动态魔法解析器 (由于都是 object-cover，两层会精准重叠) */}
             <div className="absolute inset-0 z-10">
                 {item.svgUrl ? (
                     <AnimatedSvgGraphic url={item.svgUrl} animStyle={item.animStyle} />
                 ) : (
                     /* 如果没有配置动画链接，且也没有底图，才显示占位符 */
                     !item.backImage && (
                         <div className="w-full h-full p-4 md:p-6 flex flex-col items-center justify-center text-zinc-400 bg-white/50 border-2 border-dashed border-zinc-200 rounded-xl">
                            <Icon name="file-code" size={32} className="mb-2 opacity-50" />
                            <span className="text-[10px] font-bold tracking-widest uppercase">Waiting for SVG Data</span>
                         </div>
                     )
                 )}
             </div>

           </div>
           
           {/* 背面悬浮提示徽章 */}
           <div className="absolute top-2 right-2 md:top-3 md:right-3 bg-zinc-900/80 backdrop-blur-md text-white px-2 py-1 md:px-3 md:py-1.5 rounded-lg shadow-md text-[9px] md:text-[10px] font-bold uppercase tracking-widest flex items-center gap-1 md:gap-2 pointer-events-none z-20">
              <Icon name="arrow-u-up-left" size={12} weight="bold" /> <span className="hidden md:inline">Return</span>
           </div>
        </div>
      </div>
    </div>
  );
};


// --- 主程序：作品集网站 ---
 function App() {
  const [isScrolled, setIsScrolled] = useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const [selectedProject, setSelectedProject] = useState(null);
  const [activeTab, setActiveTab] = useState("");
  const [activeVolumeStep, setActiveVolumeStep] = useState(0); // ★ 新增：用于追踪当前高亮的体块步骤

  // ★ 新增：用于控制全屏查看图表的状态
  const [fullscreenView, setFullscreenView] = useState(null);

  const [aiReviews, setAiReviews] = useState({});
  const [isReviewLoading, setIsReviewLoading] = useState(false);
  
  const [contactType, setContactType] = useState("老厂房更新改造");
  const [contactArea, setContactArea] = useState("800");
  const [aiDraft, setAiDraft] = useState("");
  const [isDraftLoading, setIsDraftLoading] = useState(false);
  const [copied, setCopied] = useState(false);

  // 首屏鼠标追踪状态
  const [heroMouse, setHeroMouse] = useState({ x: 50, y: 50 }); 
  const [heroMousePx, setHeroMousePx] = useState({ x: -1000, y: -1000 }); 

  // ★ 新增：高精度平滑滚动处理函数 (解决导航栏遮挡与跳转定位问题)
  const handleScrollTo = (e, targetId) => {
    e.preventDefault();
    const target = document.getElementById(targetId);
    if (target) {
      const headerOffset = 80; // 预留固定导航栏的高度
      const elementPosition = target.getBoundingClientRect().top;
      const offsetPosition = elementPosition + window.scrollY - headerOffset;

      window.scrollTo({
        top: offsetPosition,
        behavior: "smooth"
      });
    }
  };

  useEffect(() => {
    if (!document.getElementById('phosphor-icons-stylesheet')) {
      const link = document.createElement('link');
      link.id = 'phosphor-icons-stylesheet';
      link.rel = 'stylesheet';
      link.type = 'text/css';
      link.href = 'https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css';
      document.head.appendChild(link);
    }
  }, []);

  useEffect(() => {
    const handleScroll = () => setIsScrolled(window.scrollY > 50);
    window.addEventListener('scroll', handleScroll);
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  useEffect(() => {
    if (selectedProject) {
      document.body.style.overflow = 'hidden';
      if (selectedProject.tabs && selectedProject.tabs.length > 0) {
        setActiveTab(selectedProject.tabs[0].id);
      }
      setActiveVolumeStep(0); // 每次打开项目时重置体块动画状态
    } else {
      document.body.style.overflow = 'auto';
    }
  }, [selectedProject]);

  const handleHeroMouseMove = (e) => {
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX / window.innerWidth) * 100;
    const y = (e.clientY / window.innerHeight) * 100;
    setHeroMouse({ x, y });
    setHeroMousePx({ x: e.clientX - rect.left, y: e.clientY - rect.top }); // ★ 计算相对于封面的精准坐标
  };

  const handleGenerateReview = async (project) => {
    if (aiReviews[project.id]) return; 
    setIsReviewLoading(true);
    
    const prompt = `你是一位享誉全球的建筑与室内设计评论家。请基于以下项目信息，写一段简短（约150字）但极具学术深度和诗意洞察力的评论。
    必须涉及其核心理论、空间逻辑以及对历史文脉的回应。语气要优雅、克制、极其专业。
    
    项目名：${project.title}
    核心理论：${project.details.concept}
    背景：${project.details.background}
    
    请直接输出评论内容，不需要任何客套话。`;

    const result = await callGemini(prompt);
    setAiReviews(prev => ({ ...prev, [project.id]: result }));
    setIsReviewLoading(false);
  };

  const handleGenerateDraft = async () => {
    setIsDraftLoading(true);
    const prompt = `你是一个出色的商务助理。用户访问了一位擅长“建筑空间重组”、“新旧共生”和“拓扑演变”的独立设计师的个人网站，想要发邮件寻求合作。
    请帮用户起草一封简短、专业的合作咨询邮件。
    用户的项目类型是：${contactType}。
    预计面积是：${contactArea}平方米。
    
    邮件要求：
    1. 表达对该设计师处理历史肌理与复杂空间流线的功底的赞赏。
    2. 简述自己的项目需求。
    3. 询问能否安排进一步的面谈或现场踏勘。
    4. 保持简短（200字以内），直接给出正文。`;

    const result = await callGemini(prompt);
    setAiDraft(result);
    setIsDraftLoading(false);
    setCopied(false);
  };

  const handleCopy = () => {
    document.execCommand('copy');
    navigator.clipboard?.writeText(aiDraft);
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

            <MagneticElement strength={0.1}><a href="#projects" onClick={(e) => handleScrollTo(e, 'projects')} className="hover:text-red-800 transition-colors p-2 cursor-pointer">项目作品</a></MagneticElement>
            <MagneticElement strength={0.1}><a href="#contact" onClick={(e) => handleScrollTo(e, 'contact')} className="hover:text-red-800 transition-colors p-2 cursor-pointer">联系合作</a></MagneticElement>
          </div>

          <button className="md:hidden" onClick={() => setMobileMenuOpen(!mobileMenuOpen)}>
            {mobileMenuOpen ? <Icon name="x" size={28} /> : <Icon name="list" size={28} />}
          </button>
        </div>

        <div className={`md:hidden absolute top-full left-0 w-full bg-white border-t border-gray-100 transition-all duration-300 overflow-hidden ${mobileMenuOpen ? 'max-h-64' : 'max-h-0'}`}>
          <div className="flex flex-col p-6 gap-4 text-center tracking-widest font-medium">
             {/* ★ 移动端导航应用平滑滚动校准 */}
             <a href="#home" onClick={(e) => { setMobileMenuOpen(false); handleScrollTo(e, 'home'); }} className="cursor-pointer">首页</a>
             <a href="#about" onClick={(e) => { setMobileMenuOpen(false); handleScrollTo(e, 'about'); }} className="cursor-pointer">关于我</a>
             <a href="#projects" onClick={(e) => { setMobileMenuOpen(false); handleScrollTo(e, 'projects'); }} className="cursor-pointer">项目作品</a>
             <a href="#contact" onClick={(e) => { setMobileMenuOpen(false); handleScrollTo(e, 'contact'); }} className="cursor-pointer">联系合作</a>
